<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ title or "Sales UI" }}</title>
    <style>
      :root {
        --bg: #08111f;
        --panel: rgba(10, 18, 34, 0.84);
        --panel-strong: #0f1b31;
        --line: rgba(148, 163, 184, 0.18);
        --text: #e5eefc;
        --muted: #98a7c2;
        --accent: #7dd3fc;
        --accent-2: #34d399;
        --danger: #f87171;
        --warn: #fbbf24;
        --shadow: 0 30px 80px rgba(0, 0, 0, 0.35);
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        color: var(--text);
        background:
          radial-gradient(circle at top left, rgba(125, 211, 252, 0.18), transparent 26%),
          radial-gradient(circle at top right, rgba(52, 211, 153, 0.12), transparent 22%),
          linear-gradient(180deg, #06101d 0%, #0a1322 45%, #060b14 100%);
        font-family: "Segoe UI", "Trebuchet MS", "Aptos", sans-serif;
      }
      a { color: var(--accent); text-decoration: none; }
      a:hover { text-decoration: underline; }
      .shell {
        max-width: 1440px;
        margin: 0 auto;
        padding: 24px;
      }
      .topbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 16px;
        margin-bottom: 24px;
      }
      .brand {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }
      .brand h1 {
        margin: 0;
        font-size: 26px;
        letter-spacing: 0.3px;
      }
      .brand p,
      .muted { color: var(--muted); margin: 0; }
      .pill {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 8px 12px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid var(--line);
      }
      .grid {
        display: grid;
        gap: 16px;
      }
      .cards {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }
      .panel {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 18px;
        box-shadow: var(--shadow);
        backdrop-filter: blur(12px);
      }
      .card {
        padding: 18px;
      }
      .card .value {
        font-size: 32px;
        font-weight: 700;
        margin: 8px 0 0;
      }
      .card .label {
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.08em;
        font-size: 12px;
      }
      .toolbar {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        align-items: end;
        margin: 18px 0;
      }
      .field {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      .field label {
        color: var(--muted);
        font-size: 12px;
      }
      input, select, textarea, button {
        font: inherit;
      }
      input, select, textarea {
        border: 1px solid var(--line);
        background: rgba(8, 15, 28, 0.88);
        color: var(--text);
        border-radius: 12px;
        padding: 11px 12px;
        min-width: 180px;
      }
      textarea { min-width: 100%; }
      button, .button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        border: 1px solid rgba(125, 211, 252, 0.35);
        background: linear-gradient(135deg, rgba(125, 211, 252, 0.26), rgba(52, 211, 153, 0.22));
        color: var(--text);
        padding: 11px 14px;
        border-radius: 12px;
        cursor: pointer;
        font-weight: 600;
      }
      table {
        width: 100%;
        border-collapse: collapse;
      }
      th, td {
        padding: 12px 10px;
        border-bottom: 1px solid rgba(148, 163, 184, 0.12);
        vertical-align: top;
      }
      th {
        color: var(--muted);
        text-align: left;
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }
      tr:hover td { background: rgba(255, 255, 255, 0.02); }
      .table-wrap { overflow: auto; }
      .badge {
        display: inline-flex;
        align-items: center;
        padding: 5px 9px;
        border-radius: 999px;
        font-size: 12px;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.05);
      }
      .badge.hot { color: #7dd3fc; }
      .badge.warm { color: #fbbf24; }
      .badge.cold { color: #94a3b8; }
      .badge.good { color: #34d399; }
      .badge.warn { color: #fbbf24; }
      .badge.danger { color: #f87171; }
      .section {
        padding: 18px;
      }
      .stack {
        display: grid;
        gap: 12px;
      }
      .bubble {
        padding: 12px 14px;
        border-radius: 14px;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.04);
      }
      .bubble.user { background: rgba(125, 211, 252, 0.08); }
      .bubble.assistant { background: rgba(52, 211, 153, 0.08); }
      .bubble.system { background: rgba(251, 191, 36, 0.08); }
      .split {
        display: grid;
        grid-template-columns: 1.1fr 0.9fr;
        gap: 16px;
      }
      .small { font-size: 12px; }
      .mono { font-family: Consolas, "SFMono-Regular", monospace; }
      .notice {
        padding: 14px 16px;
        border-radius: 14px;
        border: 1px solid rgba(125, 211, 252, 0.25);
        background: rgba(125, 211, 252, 0.08);
        margin-bottom: 16px;
      }
      .error {
        border-color: rgba(248, 113, 113, 0.3);
        background: rgba(248, 113, 113, 0.08);
      }
      .pagination {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        margin-top: 14px;
      }
      @media (max-width: 1120px) {
        .cards, .split { grid-template-columns: 1fr; }
        .topbar { flex-direction: column; align-items: stretch; }
        input, select { min-width: 0; width: 100%; }
      }
    </style>
  </head>
  <body>
    <div class="shell">
      {% block body %}{% endblock %}
    </div>
  </body>
  </html>
